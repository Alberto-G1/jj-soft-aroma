{% extends 'base.html' %}
{% block title %}Page Not Found — J&amp;J Soft Aroma{% endblock %}

{% block content %}
<div class="error-page">
  <div class="container text-center py-5">
    <div class="error-icon-wrap">🔍</div>
    <div class="error-code">404</div>
    <h3 style="font-family:'Playfair Display',serif;color:var(--navy-deep);margin:18px 0 10px;">
      Page Not Found
    </h3>
    <p style="color:var(--text-mid);font-size:0.92rem;max-width:400px;margin:0 auto 32px;">
      Oops! The page you're looking for doesn't exist or may have been moved.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ url_for('customer.home') }}" class="btn-primary-custom">
        <i class="bi bi-house"></i> Go Home
      </a>
      <a href="{{ url_for('customer.products') }}" class="btn-outline-custom">
        <i class="bi bi-bag"></i> Browse Products
      </a>
    </div>
  </div>
</div>
{% endblock %}
